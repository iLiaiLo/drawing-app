<!DOCTYPE html>
<html>
    <head>
        <title>drawing app</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="utf-8">
        <link rel="stylesheet" href="drawing.css">
    </head>
    <body>
        <div class="menu">
            <div class="dropdown" >
                <div class="dropbtn">tools</div>
                <div class="cont">
                <div class="item" id="brush">brush</div>
                <div class="item" id="treeangle">treenagle</div>
                <div class="item" id="rectangle">rectangle</div>
                <div class="item" id="circle">circle</div>
                <div class="item" id="line">line</div>
            </div>
        </div>
        <div class="content">thickenss<br><input id="range" type="range" style="width:70px;" min="1"></div>

            <div class="content" id="fill">filled figure<br><img src="bucket.png" width="40px" height="40px"></div>
            <div class="content" id="clear">clear canva<br><img src="cl.webp" width="40" height="40"></div>
            <div class="content" id="eraser">erase<br><img src="eraser.png"  width="40px" height="40px"></div>
        </div>
        <canvas id="canva" style="width:1200px;height:600px;position:absolute;background-color: white; top:18%;left:50%;margin-left:-600px;"></canvas>

    </body>
    <script src="drawing.js"></script>
</html>
